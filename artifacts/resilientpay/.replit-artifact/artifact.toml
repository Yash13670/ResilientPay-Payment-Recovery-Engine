kind = "web"
previewPath = "/"
title = "ResilientPay"
version = "1.0.0"
id = "artifacts/resilientpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22158

[services.development]
run = "pnpm --filter @workspace/resilientpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resilientpay", "run", "build" ]
publicDir = "artifacts/resilientpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22158"
BASE_PATH = "/"
